resources:
  jobs:
    sample_job:
      name: iris_etl_pipeline

      trigger:
        periodic:
          interval: 1
          unit: DAYS

      parameters:
        - name: catalog
          default: ${var.catalog}

        - name: schema
          default: ${var.schema}

      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ../src/batch8dabs_etl/bronze.py

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ../src/batch8dabs_etl/silver.py

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ../src/batch8dabs_etl/gold.py

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl