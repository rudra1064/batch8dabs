# The main pipeline for batch8dabs

resources:
  pipelines:
    batch8dabs_etl:
      name: batch8dabs_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/batch8dabs_etl"

      libraries:
        - glob:
            include: ../src/batch8dabs_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
