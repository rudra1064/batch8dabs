# This is a Databricks asset bundle definition for batch8dabs.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: batch8dabs
  uuid: a79f7978-3194-42b5-885b-0670c6d2c9d4

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: python -m uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405612634171455.15.azuredatabricks.net
    variables:
      catalog: dbx_training
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-7405612634171455.15.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/rudra.gearup.more@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/rudra.gearup.more@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dbx_training
      schema: prod
    permissions:
      - user_name: rudra.gearup.more@gmail.com
        level: CAN_MANAGE
